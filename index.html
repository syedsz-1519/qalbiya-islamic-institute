    <!-- Primary SEO Meta Tags -->

    <!-- Dynamic Metadata / SEO Script -->
    <script>
      (function() {
        function updateMeta() {
          const pathName = window.location.pathname || '';
          // Normalize path (strip leading slash)
          const cleanPath = pathName.replace(/^\//, "");
          // Split into path and search params
          const parts = cleanPath.split('?');
          const path = parts[0] || '';
          const search = window.location.search || '';

          let view = 'home';
          if (path.includes('women')) view = 'women';
          else if (path.includes('kids')) view = 'kids';
          else if (path.includes('scholarship')) view = 'scholarship';
          else if (path.includes('portal')) view = 'portal';
          else if (path.includes('analytics')) view = 'analytics';
          else if (path.includes('resources') || path.includes('learn') || path.includes('free-courses')) view = 'resources';
          else if (path.includes('contact')) view = 'contact';
          else if (path.includes('about')) view = 'about';
          else if (path.includes('faq')) view = 'faq';
          else if (path.includes('refund-policy')) view = 'refund-policy';
          else if (path.includes('terms-conditions')) view = 'terms-conditions';
          else if (path.includes('privacy-policy')) view = 'privacy-policy';
          else if (path.includes('courses/women/') || path.includes('courses/kids/') || path.startsWith('course-')) view = 'course-detail';

          // Extract sub-tab and track query params
          let subTab = '';
          let track = '';
          if (search) {
            const params = new URLSearchParams(search);
            subTab = params.get('sub') || '';
            track = params.get('track') || '';
          }

          const descriptions = {
            home: "Discover QALBIYA Islamic Institute. We offer structured academic Deeniyat programs, private 1:1 Tajweed classes, and immersive Quranic Arabic learning for kids, teens, and women.",
            women: "Empower your sacred learning journey. QALBIYA offers structured academic Deeniyat programs and private 1:1 Tajweed classes customized for sisters and women.",
            kids: "Instill love for the Deen in children. QALBIYA offers interactive Juniors Deeniyat and kids Tajweed classes led by professional educators.",
            scholarship: "Apply for full tuition waivers or sponsor deserving students through Sadaqah Jariyah at QALBIYA Islamic Institute.",
            portal: {
              default: "Access the QALBIYA Student & Parent Portal. Track your course progress, download course materials, join online classes, and view study ledgers.",
              progress: "Check your academic course progress, view active lessons, and download certifications on the QALBIYA Student Portal.",
              bookmarks: "Access your bookmarked Quran lessons, Tajweed resources, and Deeniyat reference textbooks on the QALBIYA Student Portal.",
              profile: "Manage your QALBIYA student account profile, study background, age group, and academic spiritual goals.",
              emails: "View your verified communications, enrollment ledgers, and official announcements on the QALBIYA Student Portal."
            },
            analytics: {
              default: "QALBIYA Administrative and Registrar Analytics Dashboard. Monitor enrollment ledgers, review course forms, and inspect DNS deliverability.",
              forms: "Review submitted student registration forms, intake feedback, and academic surveys on the Admin Console.",
              testimonials: "Moderate student testimonials, success stories, and parent feedback for the QALBIYA public showcase.",
              messages: "Read administrative contact desk messages, WhatsApp inquiry records, and general admissions inquiries.",
              faqs: "Update public frequently asked questions, policy disclosures, and help desk entries for QALBIYA.",
              enrollments: "Monitor live admissions registries, student academic fees ledgers, and batch allocations on the Registrar Dashboard.",
              domain: "Verify registrar DNS SPF, DKIM, and DMARC record health to maintain reliable communication channels."
            },
            resources: {
              default: "Access free Islamic learning resources, curated textbook materials, Arabic vocabulary builders, and traditional reference texts.",
              audit: {
                default: "Access free audited academic Deeniyat course textbooks, Tazkiyah lectures, and classical Arabic calligraphy worksheets.",
                tarbiyah: "Access free spiritual Tazkiyah lectures and self-purification audios on QALBIYA Audited Curricula.",
                calligraphy: "Learn the holy Thuluth and Naskh scripts, brush strokes, and classical Arabic calligraphy step-by-step."
              },
              tools: "Utilize interactive Quranic Arabic vocabulary flashcards, live recitation feedback tools, and reference text search engines."
            },
            contact: "Contact QALBIYA Islamic Institute. Reach our administrative desk for questions about our admissions, schedules, or traditional curricula.",
            about: "Learn about the founders, classical methodology, and heart-centered vision of QALBIYA Islamic Institute.",
            faq: "Frequently Asked Questions about QALBIYA courses, custom timetables, fees, certifications, and technical portal requirements.",
            'refund-policy': "Review QALBIYA Islamic Institute's refund policy, monthly fee structures, and course withdrawal guidelines.",
            'terms-conditions': "Read the official Terms and Conditions governing enrollment, behavior codes, and digital study tools at QALBIYA.",
            'privacy-policy': "Our privacy policy outlines how we safeguard student profile information, study records, and registration details.",
            'course-detail': "Explore program details, schedules, textbooks, and syllabus outlines for specialized classical Islamic study courses at QALBIYA."
          };

          let desc = '';
          if (descriptions[view]) {
            if (typeof descriptions[view] === 'object') {
              if (view === 'resources' && subTab === 'audit' && track) {
                desc = descriptions.resources.audit[track] || descriptions.resources.audit.default;
              } else {
                desc = descriptions[view][subTab] || descriptions[view].default;
              }
            } else {
              desc = descriptions[view];
            }
          } else {
            desc = "Explore program details, schedules, textbooks, and syllabus outlines for specialized classical Islamic study courses at QALBIYA.";
          }

          // Build explicit canonical URL
          let canonical = "https://qalbiya-islamic-institute.vercel.app/";
          if (view !== 'home') {
            canonical += path;
            const params = new URLSearchParams();
            if (subTab) params.set('sub', subTab);
            if (track) params.set('track', track);
            
            const paramString = params.toString();
            if (paramString) {
              canonical += '?' + paramString;
            }
          }

          const metaDesc = document.getElementById('seo-meta-description');
          if (metaDesc) metaDesc.setAttribute('content', desc);

          const canonicalLink = document.getElementById('seo-canonical-link');
          if (canonicalLink) {
            canonicalLink.setAttribute('href', canonical);
          }
        }

        // Run immediately
        updateMeta();
        // Also listen to hashchange
        window.addEventListener('hashchange', updateMeta);
      })();
    </script>
